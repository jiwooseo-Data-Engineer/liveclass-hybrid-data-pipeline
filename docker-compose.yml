version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: ucl_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: ucl_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    restart: always
    depends_on:
      - zookeeper

  superset:
    image: apache/superset:2.1.0-dev
    container_name: ucl_superset
    command: ["sh", "-c", "pip install --no-cache-dir 'packaging<24' sqlalchemy-bigquery google-cloud-bigquery && /usr/bin/run-server.sh"]
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=your_cool_secret_key_here_12345
      - TALISMAN_CONFIG={"force_https":false}
      # 💡 [추가] Superset이 내부 SQLite 대신 PostgreSQL db를 바라보도록 설정합니다.
      - SUPERSET_ENV=production
      - SQLALCHEMY_DATABASE_URI=postgresql://superset:superset@db:5432/superset
    volumes:
      - superset_home:/app/superset_home
      - ./bigquery-key.json:/app/bigquery-key.json
    restart: always
    depends_on:
      - db

  db:
    image: postgres:15
    container_name: ucl_superset_db
    ports:
      - "5433:5432" # 내 PC랑 충돌 안 나게 외부는 5433, 내부는 무조건 5432!
    environment:
      - POSTGRES_USER=superset
      - POSTGRES_PASSWORD=superset
      - POSTGRES_DB=superset
    volumes:
      # 💡 [추가] 컨테이너가 내려가도 DB 데이터가 유지되도록 볼륨을 매핑합니다.
      - db_home:/var/lib/postgresql/data
    restart: always

volumes:
  superset_home:
  db_home: